apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor-frontend
  template:
    metadata:
      labels:
        app: sensor-frontend
    spec:
      nodeSelector:
        node-role: app
      containers:
        - name: sensor-frontend
          image: sensor-frontend:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000 # Next.js 포트
          # 🌟 중요: Next.js가 외부 접속을 허용하도록 환경 변수 추가
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          resources:
            limits:
              memory: "512Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: sensor-frontend
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sensor-ingress
  # 🌟 문제가 된 annotations 부분을 삭제하거나 주석 처리하세요.
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
