apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-init-sql
data:
  init.sql: |
    -- 이 내용은 DB가 처음 생성될 때 한 번만 자동 실행됩니다.
    CREATE DATABASE IF NOT EXISTS sensor_db;
    USE sensor_db;

    CREATE TABLE IF NOT EXISTS sensors (
        id VARCHAR(50) NOT NULL,
        name VARCHAR(100) NOT NULL,
        type ENUM('piezo','adxl') NOT NULL,
        sampling_rate INT(11) DEFAULT 1000,
        threshold_min FLOAT DEFAULT NULL,
        threshold_max FLOAT DEFAULT NULL,
        location VARCHAR(200) DEFAULT NULL,
        physics_k FLOAT DEFAULT 0.5,
        physics_c FLOAT DEFAULT 0.01,
        physics_m FLOAT DEFAULT 1,
        ambient_temp FLOAT DEFAULT 25,
        recommended_k FLOAT DEFAULT NULL,
        recommended_c FLOAT DEFAULT NULL,
        recommended_threshold FLOAT DEFAULT NULL,
        is_active TINYINT(1) DEFAULT 1,
        last_calibrated_at TIMESTAMP NULL DEFAULT NULL,
        created_at TIMESTAMP NULL DEFAULT current_timestamp(),
        updated_at TIMESTAMP NULL DEFAULT current_timestamp() ON UPDATE current_timestamp(),
        is_deleted TINYINT(1) DEFAULT 0,
        deleted_at TIMESTAMP DEFAULT NULL
    );

    CREATE TABLE IF NOT EXISTS ai_models (
        id INT AUTO_INCREMENT PRIMARY KEY,
        sensor_type VARCHAR(50) NOT NULL,
        model_type VARCHAR(50) NOT NULL,
        status VARCHAR(20) NOT NULL,
        file_path VARCHAR(255) DEFAULT NULL,
        created_at DATETIME DEFAULT current_timestamp(),
        updated_at DATETIME DEFAULT current_timestamp() ON UPDATE current_timestamp(),
        is_deleted TINYINT(1) DEFAULT 0,
        deleted_at DATETIME DEFAULT NULL
    );
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      nodeSelector:
        node-role: data # 🌟 Data 노드 지정
      containers:
        - name: mariadb
          image: mariadb:10.11
          ports:
            - containerPort: 3306
              hostPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: "sensor_root_password"
            - name: MARIADB_DATABASE
              value: "sensor_db"
            - name: MARIADB_USER
              value: "sensor_user"
            - name: MARIADB_PASSWORD
              value: "sensor_password"
          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql
            - name: init-sql-volume
              mountPath: /docker-entrypoint-initdb.d
          resources:
            limits:
              memory: "800Mi"
              cpu: "500m"
      volumes:
        - name: mariadb-storage
          persistentVolumeClaim:
            claimName: mariadb-pvc
        - name: init-sql-volume
          configMap:
            name: mariadb-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-svc
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
