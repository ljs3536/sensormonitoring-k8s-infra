# 08-ai.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor-ai
  template:
    metadata:
      labels:
        app: sensor-ai
    spec:
      nodeSelector:
        node-role: ai
      containers:
        - name: sensor-ai
          image: sensor-ai:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: sensor-config
            # 👇 AI 파드에도 이 두 줄을 추가해 주세요!
            - secretRef:
                name: sensor-secret
          resources:
            limits:
              memory: "4Gi"
              cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: sensor-ai-svc
spec:
  selector:
    app: sensor-ai
  ports:
    - port: 8002 # 🌟 포트 수정
      targetPort: 8002
